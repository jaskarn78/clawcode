                      - generic [ref=e2676]: J'avais pris connaissance par hasard de ce produit, après réflexion de divers critique je me suis laissé tenter à l'achat. Depuis quelques semaines j'utilise ce produit dans mon kit barbe et honnêtement ce petit truc fait son effet comme il est vendu. Autrement dit il rafraîchi la barbe quand celle-ci est sec (au réveil, plage...) elle donne un coup de booste au poils bien sympa avec une odeur sympathique pour ma part j'ai l'impression à de la bergamote (bon chimique vu les composants) mais le résultat est là le poils est souple et doux d'un coup c'est rapide... de plus ce produit s'annonce comme une pré application afin par la suite de rajouter une huile ou une baume (attention à disposer d'une huile ou baume au parfum discret pour éviter un mélange d'odeur trop forte...) je la combine avec mon huile à barbe, Honest Amish (produit purement naturel) les deux se mélangent très bien j'ai un poils doux, agréable au coiffé et qui tient très bien . Honnêtement Reuzel autre que ces cires et baume réalise ici un magnifique petit truc magique très efficace et qui tient promesse rien de menteur pour faire vendre... Dans mon kit ce produit est devenu indispensable et je le conseil fortement avec un prix correct
