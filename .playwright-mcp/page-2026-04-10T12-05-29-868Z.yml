                        - generic [ref=e2708]:
                          - text: Having used the ‘original’ Reuzel beard foam - I was really keen to try the ‘Wood and Spice’ foam.
                          - text: This beard foam is one of my favourite and go to beard care products, I have a medium length beard which I wash twice a week with beard shampoo, I don’t use any fancy conditioners or beard oil. The reason I don’t use beard oil is I find it just sits on my beard and makes my face feel greasy/oily. I’m a no fuss, no faff kind of person so this beard foam really is an amazing product - it has multiple benefits; it deodorises your beard, leaving it smelling absolutely amazing. The Wood and Spice fragrance is a sweet and woody, lingers in your beard all day, it reminds me of a sweet spiced rum! The foam leaves my beard looking and feeling a lot fuller, my beard feels a lot softer also with continued use of the beard foam. Provides a slight hold also which is great for helping stray hairs. It helps nourish the beard and the skin underneath, so be sure to work the foam into your face. I love the lightweight formula, only 2-3 pumps is all you need to give your beard a good coating, it absorbs really quickly and doesn’t leave any sticky residue behind. I use this around 2-3 times a day or as needed when I want to freshen up my facial fuzz. I absolutely love the Reuzel range and the Beard Foam is an excellent addition!
