                      - generic [ref=e2411]:
                        - generic [ref=e2413]:
                          - text: I tried to find a thorough review of this product before purchasing and I really didn't find much so I'm going to attempt to write the review I would have liked to see before purchasing. If you're looking for the short version I was looking for a quick and easy product for every day use that would make my beard more manageable and this besides some minor problems does fit the bill. With that said onto the slightly longer review.
                          - text: My main question about this product before buying really was very simple "What the hell is it?" Well now after using it for a few days I can tell you it's a viscous liquid that as one person put "is Reuzels attempt at making a water based beard oil" I would more say it's their attempt at making a water based more convenient balm though. The products hold I would best describe as light. It's not going to do a ton in the way of styling like a wax or heavier balm would but it does keep your hairs separated and does have some hold. They recommend using it in conjunction with their balm but to me that would defeat the purpose of convenience I wanted a product that even if I was running late for work I could grab slap on and be good to go with little to no thought. The product comes out in a semi light half foam it's not nearly as light as foaming hand soap and it's not as heavy as a mousse. It's slightly sticky to the touch and goes on kind of white but quickly becomes absorbed into the skin and is clear.
                          - text: My next question about this product before buying it was "what does it smell like?" Well that's one of the cons of this product as far as I'm concerned though it is minor. It smells like what my grandma use to smell like. I understand nobody reading this has ever smelled my grandmother so the next closest thing it smells like that you may have been around is a laundromat. They are correct that that does smell "clean" but it's not exactly a smell I associate with being very pleasant. One reviewer said they thought it smelled of patchouli it absolutely does not it smells of cheap fabric softener.
                          - text: Third and most important question was the obvious does it work? It does work for what I wanted to use it for. It's very quick to apply, it does soften your beard, I like the idea of a pump action bottle as opposed to trying to dab out oil or get balm under my nails or properly dose out the proper amount when I'm in a hurry. It also isn't heavy like an oil or balm it's very light and absorbs fast. If you need extra hold I do recommend using a balm with it or a wax but this does have some hold and it keeps your hairs separated as opposed to pushed together making it easier to comb or brush out later in the day if you need to.
                          - text: The last thing I'd like to touch on is I do have semi sensitive skin and this product thus far does appear to irritate my skin a bit at first; I will edit my review later if it gets worse. I believe looking at the ingredients this is most likely a sensitivity to the fragrance coupled with the fact I'm not a fan of the scent I wish they would make a completely non scented version of this and I would consider this a 5 star product. It may also be the witch hazel slightly drying out my skin though. Again I'll update this review later should this problem worsen but I consider this minor at the moment and otherwise this is a solid product I would buy again.
