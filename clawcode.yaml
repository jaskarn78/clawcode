    mcpEnvOverrides:
      1password:
        OP_SERVICE_ACCOUNT_TOKEN: "op://clawdbot/f24sxydllnmblltmwe6ue2hwfi/credential"
  - name: general
    workspace: /home/jjagpal/.clawcode/agents/general
