# clawcode.yaml — v2.0 endpoint
version: 1
mcpServers:
  finnhub:
    name: finnhub
    command: node
    args:
      - /path/to/finnhub.js
    env:
      FINNHUB_API_KEY: op://clawdbot/Finnhub/api-key  # op:// reference — safe
  finmentum-db:
    name: finmentum-db
    command: mcporter
    args:
      - serve
      - mysql
    env:
      MYSQL_HOST: op://clawdbot/MySQL/host
  clawcode:
    name: clawcode
    command: node
    args:
      - /path/to/clawcode-mcp.js
  1password:
    name: 1password
    command: op
    args:
      - plugin
      - run
discord:
  botToken: op://clawdbot/Clawdbot Discord Token/credential  # operator-edited line
defaults:
  model: sonnet
  basePath: ~/.clawcode/agents
agents:
  - name: existing-alpha
    workspace: ~/.clawcode/agents/existing-alpha
    model: sonnet
    channels:
      - "111111111111111111"
    mcpServers:
      - clawcode
      - 1password
  - name: existing-beta
    workspace: ~/.clawcode/agents/existing-beta
    model: haiku
    channels:
      - "222222222222222222"
    mcpServers:
      - clawcode
      - 1password
      - finnhub
