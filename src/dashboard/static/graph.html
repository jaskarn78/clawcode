<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Knowledge Graph — ClawCode</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- D3.js for force-directed graph -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    :root {
      --bg-deep: #0a0a0f;
      --bg-surface: #12121a;
      --bg-elevated: #1a1a2e;
      --text-primary: #e8e6e3;
      --text-secondary: #8a8a9a;
      --accent-primary: #ff3366;
      --accent-secondary: #00e5ff;
      --node-hot: #ff3366;
      --node-warm: #ffc400;
      --node-cold: #616161;
      --link-color: rgba(0, 229, 255, 0.15);
      --link-hover: rgba(0, 229, 255, 0.6);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
    }

    /* Header */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid rgba(255, 51, 102, 0.2);
    }

    .logo {
      display: flex; align-items: center; gap: 4px;
      font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 1.3rem;
      user-select: none; cursor: pointer; text-decoration: none;
    }
    .logo-bracket { color: var(--accent-primary); }
    .logo-slash { color: var(--accent-secondary); }
    .logo-text { color: var(--text-primary); margin-left: 6px; letter-spacing: -0.02em; }

    .header-controls {
      display: flex; align-items: center; gap: 16px;
    }

    .agent-select {
      font-family: "JetBrains Mono", monospace; font-size: 0.8rem;
      background: var(--bg-elevated); color: var(--text-primary);
      border: 1px solid rgba(0, 229, 255, 0.3); border-radius: 4px;
      padding: 6px 12px; cursor: pointer; outline: none;
    }
    .agent-select:focus { border-color: var(--accent-secondary); }
    .agent-select option { background: var(--bg-surface); }

    .graph-stats {
      font-family: "JetBrains Mono", monospace; font-size: 0.75rem;
      color: var(--text-secondary); display: flex; gap: 16px;
    }
    .stat-val { color: var(--accent-secondary); font-weight: 700; }

    /* Graph canvas */
    #graph-container {
      position: absolute; top: 56px; left: 0; right: 0; bottom: 0;
      background: var(--bg-deep);
      background-image:
        radial-gradient(ellipse at 30% 40%, rgba(255, 51, 102, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, rgba(0, 229, 255, 0.03) 0%, transparent 50%);
    }

    #graph-container svg { width: 100%; height: 100%; }

    /* Tooltip */
    .graph-tooltip {
      position: fixed; pointer-events: none; z-index: 200;
      background: var(--bg-surface); border: 1px solid rgba(0, 229, 255, 0.3);
      border-radius: 6px; padding: 12px 16px; max-width: 360px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      opacity: 0; transition: opacity 0.15s ease;
      font-size: 0.8rem;
    }
    .graph-tooltip.visible { opacity: 1; }

    .tooltip-id {
      font-family: "JetBrains Mono", monospace; font-size: 0.7rem;
      color: var(--accent-secondary); margin-bottom: 4px;
    }
    .tooltip-content {
      color: var(--text-primary); line-height: 1.4;
      max-height: 120px; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical;
    }
    .tooltip-meta {
      display: flex; gap: 12px; margin-top: 8px;
      font-family: "JetBrains Mono", monospace; font-size: 0.68rem;
      color: var(--text-secondary);
    }
    .tooltip-tier {
      padding: 1px 6px; border-radius: 3px; font-size: 0.65rem;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .tooltip-tier.hot { background: rgba(255, 51, 102, 0.2); color: var(--node-hot); }
    .tooltip-tier.warm { background: rgba(255, 196, 0, 0.2); color: var(--node-warm); }
    .tooltip-tier.cold { background: rgba(97, 97, 97, 0.2); color: var(--node-cold); }

    .tooltip-tags {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
    }
    .tooltip-tag {
      font-family: "JetBrains Mono", monospace; font-size: 0.62rem;
      padding: 1px 5px; border-radius: 3px;
      background: var(--bg-elevated); color: var(--accent-primary);
      border: 1px solid rgba(255, 51, 102, 0.2);
    }

    /* Loading */
    .loading-overlay {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: var(--bg-deep); z-index: 50;
    }
    .loading-text {
      font-family: "JetBrains Mono", monospace; font-size: 0.9rem;
      color: var(--text-secondary);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Empty state */
    .empty-state {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
    }
    .empty-state-icon { font-size: 3rem; opacity: 0.3; }
    .empty-state-text {
      font-family: "JetBrains Mono", monospace; font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* Legend */
    .graph-legend {
      position: fixed; bottom: 20px; left: 20px; z-index: 100;
      background: var(--bg-surface); border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px; padding: 12px 16px;
      font-family: "JetBrains Mono", monospace; font-size: 0.7rem;
      display: flex; flex-direction: column; gap: 6px;
    }
    .legend-title {
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-secondary); font-size: 0.65rem; margin-bottom: 2px;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .legend-label { color: var(--text-secondary); }
  </style>
</head>
<body>

  <header class="top-bar">
    <a class="logo" href="/">
      <span class="logo-bracket">{</span><span class="logo-slash">/</span><span class="logo-bracket">}</span>
      <span class="logo-text">ClawCode</span>
    </a>
    <div class="header-controls">
      <div class="graph-stats" id="graph-stats"></div>
      <select class="agent-select" id="agent-select">
        <option value="">Loading agents...</option>
      </select>
    </div>
  </header>

  <div id="graph-container">
    <div class="loading-overlay" id="loading">
      <span class="loading-text">Loading knowledge graph...</span>
    </div>
  </div>

  <div class="graph-tooltip" id="tooltip"></div>

  <div class="graph-legend">
    <div class="legend-title">Memory Tier</div>
    <div class="legend-item">
      <span class="legend-dot" style="background: var(--node-hot); box-shadow: 0 0 6px rgba(255, 51, 102, 0.5);"></span>
      <span class="legend-label">Hot (in context)</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background: var(--node-warm);"></span>
      <span class="legend-label">Warm (searchable)</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background: var(--node-cold);"></span>
      <span class="legend-label">Cold (archived)</span>
    </div>
    <div class="legend-title" style="margin-top: 8px;">Size = importance</div>
  </div>

<script>
const TIER_COLORS = { hot: "#ff3366", warm: "#ffc400", cold: "#616161" };
const TIER_GLOW = { hot: "rgba(255, 51, 102, 0.6)", warm: "rgba(255, 196, 0, 0.3)", cold: "none" };

let simulation = null;
let currentAgent = null;

async function fetchAgents() {
  try {
    const res = await fetch("/api/status");
    if (!res.ok) return [];
    const data = await res.json();
    return (data.agents || []).map(a => a.name).filter(n => !n.includes("-thread-") && !n.includes("-sub-"));
  } catch { return []; }
}

async function fetchGraph(agent) {
  const res = await fetch(`/api/graph/${encodeURIComponent(agent)}`);
  if (!res.ok) throw new Error("Failed to load graph");
  return res.json();
}

function updateStats(nodes, links) {
  const el = document.getElementById("graph-stats");
  const hot = nodes.filter(n => n.tier === "hot").length;
  const warm = nodes.filter(n => n.tier === "warm").length;
  el.innerHTML = `
    <span><span class="stat-val">${nodes.length}</span> memories</span>
    <span><span class="stat-val">${links.length}</span> links</span>
    <span><span class="stat-val">${hot}</span> hot</span>
    <span><span class="stat-val">${warm}</span> warm</span>
  `;
}

function showTooltip(event, d) {
  const tip = document.getElementById("tooltip");
  const tags = (d.tags || []).map(t => `<span class="tooltip-tag">${t}</span>`).join("");
  const truncId = d.id.length > 12 ? d.id.slice(0, 12) + "..." : d.id;
  const truncContent = d.content.length > 200 ? d.content.slice(0, 200) + "..." : d.content;

  tip.innerHTML = `
    <div class="tooltip-id">${truncId}</div>
    <div class="tooltip-content">${truncContent}</div>
    <div class="tooltip-meta">
      <span class="tooltip-tier ${d.tier}">${d.tier}</span>
      <span>imp: ${d.importance.toFixed(2)}</span>
      <span>links: ${d.linkCount}</span>
    </div>
    ${tags ? `<div class="tooltip-tags">${tags}</div>` : ""}
  `;

  tip.style.left = (event.clientX + 16) + "px";
  tip.style.top = (event.clientY - 10) + "px";
  tip.classList.add("visible");
}

function hideTooltip() {
  document.getElementById("tooltip").classList.remove("visible");
}

function renderGraph(data) {
  const container = document.getElementById("graph-container");
  const loading = document.getElementById("loading");

  // Clear previous
  container.querySelectorAll("svg, .empty-state").forEach(el => el.remove());
  if (loading) loading.style.display = "none";

  const nodes = data.nodes || [];
  const links = (data.links || []).map(l => ({ source: l.source, target: l.target, text: l.text }));

  if (nodes.length === 0) {
    container.innerHTML += `
      <div class="empty-state">
        <div class="empty-state-icon">&#x1f578;</div>
        <div class="empty-state-text">No memories yet for this agent</div>
      </div>
    `;
    updateStats([], []);
    return;
  }

  // Count links per node
  const linkCounts = {};
  links.forEach(l => {
    linkCounts[l.source] = (linkCounts[l.source] || 0) + 1;
    linkCounts[l.target] = (linkCounts[l.target] || 0) + 1;
  });
  nodes.forEach(n => { n.linkCount = linkCounts[n.id] || 0; });

  updateStats(nodes, links);

  const width = container.clientWidth;
  const height = container.clientHeight;

  const svg = d3.select(container).append("svg")
    .attr("viewBox", [0, 0, width, height]);

  // Defs for glow filter
  const defs = svg.append("defs");
  const filter = defs.append("filter").attr("id", "glow");
  filter.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "coloredBlur");
  const feMerge = filter.append("feMerge");
  feMerge.append("feMergeNode").attr("in", "coloredBlur");
  feMerge.append("feMergeNode").attr("in", "SourceGraphic");

  const g = svg.append("g");

  // Zoom
  const zoom = d3.zoom()
    .scaleExtent([0.1, 8])
    .on("zoom", (event) => g.attr("transform", event.transform));
  svg.call(zoom);

  // Initial zoom to fit
  const initialScale = Math.min(width, height) / 800;
  svg.call(zoom.transform, d3.zoomIdentity
    .translate(width / 2, height / 2)
    .scale(Math.max(0.3, Math.min(1.2, initialScale))));

  // Links
  const link = g.append("g")
    .selectAll("line")
    .data(links)
    .join("line")
    .attr("stroke", "var(--link-color)")
    .attr("stroke-width", 1)
    .attr("stroke-opacity", 0.4);

  // Nodes
  const nodeRadius = (d) => 4 + d.importance * 12 + Math.min(d.linkCount, 10) * 0.5;

  const node = g.append("g")
    .selectAll("circle")
    .data(nodes)
    .join("circle")
    .attr("r", nodeRadius)
    .attr("fill", d => TIER_COLORS[d.tier] || TIER_COLORS.warm)
    .attr("stroke", d => d.tier === "hot" ? TIER_GLOW.hot : "rgba(255,255,255,0.1)")
    .attr("stroke-width", d => d.tier === "hot" ? 2 : 0.5)
    .style("filter", d => d.tier === "hot" ? "url(#glow)" : "none")
    .style("cursor", "pointer")
    .on("mouseover", function(event, d) {
      // Highlight connected nodes and links
      const connected = new Set();
      links.forEach(l => {
        const sid = typeof l.source === "object" ? l.source.id : l.source;
        const tid = typeof l.target === "object" ? l.target.id : l.target;
        if (sid === d.id) connected.add(tid);
        if (tid === d.id) connected.add(sid);
      });
      connected.add(d.id);

      node.attr("opacity", n => connected.has(n.id) ? 1 : 0.1);
      link.attr("stroke-opacity", l => {
        const sid = typeof l.source === "object" ? l.source.id : l.source;
        const tid = typeof l.target === "object" ? l.target.id : l.target;
        return (sid === d.id || tid === d.id) ? 0.8 : 0.03;
      }).attr("stroke", l => {
        const sid = typeof l.source === "object" ? l.source.id : l.source;
        const tid = typeof l.target === "object" ? l.target.id : l.target;
        return (sid === d.id || tid === d.id) ? "var(--link-hover)" : "var(--link-color)";
      });

      d3.select(this).attr("r", nodeRadius(d) * 1.4);
      showTooltip(event, d);
    })
    .on("mousemove", function(event, d) {
      const tip = document.getElementById("tooltip");
      tip.style.left = (event.clientX + 16) + "px";
      tip.style.top = (event.clientY - 10) + "px";
    })
    .on("mouseout", function(event, d) {
      node.attr("opacity", 1);
      link.attr("stroke-opacity", 0.4).attr("stroke", "var(--link-color)");
      d3.select(this).attr("r", nodeRadius(d));
      hideTooltip();
    })
    .call(d3.drag()
      .on("start", (event, d) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on("end", (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    );

  // Force simulation
  simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(80).strength(0.3))
    .force("charge", d3.forceManyBody().strength(-150).distanceMax(400))
    .force("center", d3.forceCenter(0, 0))
    .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 2))
    .on("tick", () => {
      link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);
      node
        .attr("cx", d => d.x)
        .attr("cy", d => d.y);
    });
}

async function loadAgent(agentName) {
  if (!agentName) return;
  currentAgent = agentName;

  const loading = document.getElementById("loading");
  if (loading) { loading.style.display = "flex"; }

  try {
    const data = await fetchGraph(agentName);
    renderGraph(data);
  } catch (err) {
    console.error("Failed to load graph:", err);
    const container = document.getElementById("graph-container");
    if (loading) loading.style.display = "none";
    container.innerHTML += `
      <div class="empty-state">
        <div class="empty-state-icon">&#x26a0;</div>
        <div class="empty-state-text">Failed to load graph: ${err.message}</div>
      </div>
    `;
  }
}

async function init() {
  const select = document.getElementById("agent-select");
  const agents = await fetchAgents();

  if (agents.length === 0) {
    select.innerHTML = '<option value="">No agents found</option>';
    return;
  }

  select.innerHTML = agents.map(name =>
    `<option value="${name}">${name}</option>`
  ).join("");

  select.addEventListener("change", () => loadAgent(select.value));

  // Load first agent
  loadAgent(agents[0]);
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
