<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Delayed SPA</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      setTimeout(function () {
        var d = document.createElement("div");
        d.id = "dynamic";
        d.textContent = "loaded";
        document.getElementById("root").appendChild(d);
      }, 500);
    </script>
  </body>
</html>
