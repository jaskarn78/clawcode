name: Bench — Latency Regression Gate

on:
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.planning/benchmarks/**'
      - '.github/workflows/bench.yml'
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Verify baseline exists
        id: baseline_check
        run: |
          if [ ! -f .planning/benchmarks/baseline.json ]; then
            echo "::warning::No baseline.json found — skipping regression gate. Run 'clawcode bench --update-baseline' locally to establish one."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bench + check regression
        if: steps.baseline_check.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret is not set — skipping bench (CI pass-through)."
            exit 0
          fi
          node dist/cli/index.js bench --check-regression

      - name: Upload latest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-reports
          path: .planning/benchmarks/reports/
          if-no-files-found: ignore
          retention-days: 30
